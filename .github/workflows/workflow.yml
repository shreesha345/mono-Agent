name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distribution 📦 to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for trusted publishing
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    
    - name: Set up Python
      run: uv python install 3.12
      
    - name: Build package
      run: uv build
      
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      # Note: This step uses Trusted Publishing (OIDC).
      # To use this, you must configure your PyPI project to trust this GitHub repository.
      # Alternatively, you can use a PyPI API token by setting the API_TOKEN secret.
      # with:
      #   password: ${{ secrets.PYPI_API_TOKEN }}
